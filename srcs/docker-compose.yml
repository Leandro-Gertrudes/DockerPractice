services:
  # ---- Database -----------------------------------------------------------
  mariadb:
    build:
      context: ./requirements/mariadb
    image: mariadb
    container_name: mariadb
    restart: always
    env_file: .env
    networks:
      - inception
    volumes:
      - mariadb_data:/var/lib/mysql
    secrets:
      - db_password
      - db_root_password
    expose:
      - "3306"

  # ---- WordPress + php-fpm ------------------------------------------------
  wordpress:
    build:
      context: ./requirements/wordpress
    image: wordpress
    container_name: wordpress
    restart: always
    env_file: .env
    depends_on:
      - mariadb
    networks:
      - inception
    volumes:
      - wordpress_data:/var/www/html
    secrets:
      - db_password
      - wp_admin_password
      - wp_user_password
    expose:
      - "9000"

  # ---- NGINX (the only entrypoint) ----------------------------------------
  nginx:
    build:
      context: ./requirements/nginx
      args:
        DOMAIN_NAME: ${DOMAIN_NAME}
    image: nginx
    container_name: nginx
    restart: always
    depends_on:
      - wordpress
    networks:
      - inception
    volumes:
      - wordpress_data:/var/www/html 
    ports:
      - "443:443"
      
   # /////// BONUS /////////

   # ---- Redis cache --------------------------------------------------------
  redis:
    build:
      context: ./requirements/bonus/redis
    image: redis
    container_name: redis
    profiles: [bonus]
    restart: always
    networks:
      - inception
    expose:
      - "6379"
   # ---- ftp -----------------------------------------------------------------
  ftp:
    build:
      context: ./requirements/bonus/ftp
    image: ftp
    container_name: ftp
    profiles: [bonus]
    restart: always
    env_file: .env
    depends_on:
      - wordpress
    networks:
      - inception
    volumes:
      - wordpress_data:/var/www/html
    secrets:
      - ftp_password
    ports:
      - "21:21"
      - "21000-21010:21000-21010"

# ---- Docker network ------------
networks:
  inception:
    driver: bridge

# ---- Named volumes --------
volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/lgertrud/data/mariadb
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/lgertrud/data/wordpress

# ---- Secrets: ---
secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt
  ftp_password:
    file: ../secrets/ftp_password.txt
